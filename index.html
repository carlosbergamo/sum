<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservas SUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    .hidden { display: none !important; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
    select option:disabled { color: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

<!-- ══════════════════════════════════════════════════════════
     VIEW: LOGIN
══════════════════════════════════════════════════════════════ -->
<div id="view-login" class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm fade-in">

    <!-- Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-200">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-900">Reservas SUM</h1>
      <p class="text-sm text-slate-500 mt-1">Ingresá con tus datos de inquilino</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
      <div id="login-alert" class="hidden mb-4 text-sm rounded-xl px-4 py-3"></div>

      <form id="login-form" novalidate>
        <!-- Email -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-700 mb-1.5" for="login-email">Email</label>
          <input
            type="email"
            id="login-email"
            placeholder="tu@email.com"
            autocomplete="email"
            class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
          />
        </div>

        <!-- Password -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-slate-700 mb-1.5" for="login-password">Contraseña</label>
          <input
            type="password"
            id="login-password"
            placeholder="••••••••"
            autocomplete="current-password"
            class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
          />
        </div>

        <button
          type="submit"
          id="btn-login"
          class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold py-3 rounded-xl transition-colors text-sm shadow-sm">
          Ingresar
        </button>
      </form>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     VIEW: DASHBOARD
══════════════════════════════════════════════════════════════ -->
<div id="view-dashboard" class="hidden min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 px-4 py-3 sticky top-0 z-20">
    <div class="max-w-lg mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center flex-shrink-0">
          <svg class="w-4.5 h-4.5 text-white w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </div>
        <div class="min-w-0">
          <p class="font-semibold text-slate-900 text-sm leading-tight truncate" id="user-name">—</p>
          <p class="text-xs text-slate-400 truncate" id="user-depto">—</p>
        </div>
      </div>
      <button id="btn-logout"
        class="flex-shrink-0 text-xs text-slate-500 hover:text-slate-700 border border-slate-200 hover:border-slate-300 rounded-lg px-3 py-1.5 transition-colors">
        Salir
      </button>
    </div>
  </header>

  <!-- Tab Bar -->
  <div class="bg-white border-b border-slate-100 px-4 py-2.5">
    <div class="max-w-lg mx-auto">
      <div class="flex bg-slate-100 rounded-xl p-1 gap-1">
        <button id="tab-btn-reservar"
          class="flex-1 text-sm font-medium py-2 rounded-lg transition-all bg-white text-indigo-600 shadow-sm">
          ➕&nbsp; Reservar
        </button>
        <button id="tab-btn-mis-reservas"
          class="flex-1 text-sm font-medium py-2 rounded-lg transition-all text-slate-500">
          📋&nbsp; Mis Reservas
        </button>
      </div>
    </div>
  </div>

  <!-- Content -->
  <main class="flex-1 overflow-y-auto px-4 py-5">
    <div class="max-w-lg mx-auto">

      <!-- ── TAB: RESERVAR ─────────────────────────────────── -->
      <div id="tab-reservar">
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Nueva Reserva</p>

        <div id="reserva-alert" class="hidden mb-4 text-sm rounded-xl px-4 py-3"></div>

        <div class="bg-white rounded-2xl border border-slate-200 p-5">
          <form id="reserva-form" novalidate>

            <!-- Edificio (read-only display) -->
            <div class="mb-4">
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Edificio</label>
              <div class="flex items-center gap-2 w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-500">
                <svg class="w-4 h-4 text-slate-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                </svg>
                <span id="form-edificio" class="font-medium text-slate-700">—</span>
              </div>
            </div>

            <!-- Fecha -->
            <div class="mb-4">
              <label class="block text-sm font-medium text-slate-700 mb-1.5" for="reserva-fecha">
                Fecha <span class="text-red-400">*</span>
              </label>
              <input
                type="date"
                id="reserva-fecha"
                class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
              />
            </div>

            <!-- Turno -->
            <div class="mb-5">
              <label class="block text-sm font-medium text-slate-700 mb-1.5" for="reserva-turno">
                Turno <span class="text-red-400">*</span>
              </label>
              <div class="relative">
                <select
                  id="reserva-turno"
                  class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all bg-white appearance-none disabled:bg-slate-50 disabled:text-slate-400 disabled:cursor-not-allowed"
                >
                  <option value="">Primero seleccioná una fecha</option>
                  <option value="Mañana">🌅 Mañana</option>
                  <option value="Noche">🌙 Noche</option>
                </select>
                <svg class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                </svg>
              </div>
              <p id="disp-note" class="text-xs mt-1.5 text-slate-400"></p>
            </div>

            <button
              type="submit"
              id="btn-reservar"
              class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold py-3 rounded-xl transition-colors text-sm shadow-sm">
              Confirmar Reserva
            </button>
          </form>
        </div>
      </div>

      <!-- ── TAB: MIS RESERVAS ─────────────────────────────── -->
      <div id="tab-mis-reservas" class="hidden">
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Mis Próximas Reservas</p>
        <div id="reservas-container"></div>
      </div>

    </div>
  </main>
</div>

<!-- Toast -->
<div id="toast"
  class="hidden fixed bottom-5 left-1/2 -translate-x-1/2 px-5 py-3 rounded-2xl text-sm font-medium shadow-xl z-50 text-white transition-all max-w-xs text-center">
</div>

<!-- ════════════════════════════════════════════════════════
     SCRIPT
════════════════════════════════════════════════════════════ -->
<script>
// ═══════════════════════════════════════════════════════════
//  ▼▼▼  ÚNICO VALOR QUE TENÉS QUE EDITAR  ▼▼▼
// ═══════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyi1H4FSauoAPVHoenqU82pCCwq8Ncul_URp6QPbz2BJH_8yBNWgySFYNJTgWDyKjdf/exec';
// ═══════════════════════════════════════════════════════════

(function () {
  'use strict';

  // ── Estado global ──────────────────────────────────────
  let currentUser = null;

  // ── Init ───────────────────────────────────────────────
  function init() {
    try {
      const stored = localStorage.getItem('sum_user');
      if (stored) {
        currentUser = JSON.parse(stored);
        showDashboard();
      } else {
        showLogin();
      }
    } catch (_) {
      showLogin();
    }
    bindEvents();
  }

  // ── Vistas ─────────────────────────────────────────────
  function showLogin() {
    el('view-login').classList.remove('hidden');
    el('view-dashboard').classList.add('hidden');
  }

  function showDashboard() {
    el('view-login').classList.add('hidden');
    el('view-dashboard').classList.remove('hidden');

    el('user-name').textContent   = currentUser.nombre;
    el('user-depto').textContent  = `Depto ${currentUser.depto} · ${currentUser.edificio}`;
    el('form-edificio').textContent = currentUser.edificio;

    // Fecha mínima = hoy
    const today = new Date().toISOString().split('T')[0];
    el('reserva-fecha').min   = today;
    el('reserva-fecha').value = '';
    resetTurnoSelect();

    switchTab('reservar');
  }

  // ── Tabs ───────────────────────────────────────────────
  function switchTab(tab) {
    ['reservar', 'mis-reservas'].forEach(t => {
      const btn     = el(`tab-btn-${t}`);
      const content = el(`tab-${t}`);
      const active  = t === tab;

      btn.classList.toggle('bg-white', active);
      btn.classList.toggle('text-indigo-600', active);
      btn.classList.toggle('shadow-sm', active);
      btn.classList.toggle('text-slate-500', !active);
      content.classList.toggle('hidden', !active);
    });
    if (tab === 'mis-reservas') loadReservas();
  }

  // ── Helpers de API ─────────────────────────────────────
  async function apiPost(payload) {
    const resp = await fetch(APPS_SCRIPT_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain' }, // evita CORS preflight
      body:    JSON.stringify(payload)
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return resp.json();
  }

  async function apiGet(params) {
    const qs   = new URLSearchParams(params).toString();
    const resp = await fetch(`${APPS_SCRIPT_URL}?${qs}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return resp.json();
  }

  // ── LOGIN ──────────────────────────────────────────────
  async function handleLogin(e) {
    e.preventDefault();
    const email    = el('login-email').value.trim();
    const password = el('login-password').value.trim();

    if (!email || !password) {
      showAlert('login-alert', 'error', 'Completá tu email y contraseña.');
      return;
    }

    setLoading('btn-login', true, 'Ingresando...');
    hideAlert('login-alert');

    try {
      const res = await apiPost({ action: 'login', email, password });
      if (res.success) {
        currentUser = res.user;
        localStorage.setItem('sum_user', JSON.stringify(currentUser));
        showDashboard();
      } else {
        showAlert('login-alert', 'error', res.error || 'No se pudo iniciar sesión.');
      }
    } catch (_) {
      showAlert('login-alert', 'error', 'Error de conexión. Verificá tu internet e intentá de nuevo.');
    } finally {
      setLoading('btn-login', false, 'Ingresar');
    }
  }

  // ── LOGOUT ─────────────────────────────────────────────
  function handleLogout() {
    localStorage.removeItem('sum_user');
    currentUser = null;
    el('login-form').reset();
    hideAlert('login-alert');
    showLogin();
  }

  // ── DISPONIBILIDAD ─────────────────────────────────────
  async function checkDisponibilidad(fecha) {
    if (!fecha || !currentUser) return;

    const turnoSel = el('reserva-turno');
    const note     = el('disp-note');

    turnoSel.disabled = true;
    note.className    = 'text-xs mt-1.5 text-slate-400';
    note.textContent  = 'Verificando disponibilidad…';

    try {
      const res = await apiGet({
        action:   'getDisponibilidad',
        edificio: currentUser.edificio,
        fecha
      });

      if (!res.success) {
        note.textContent  = '⚠️ No se pudo verificar disponibilidad.';
        turnoSel.disabled = false;
        return;
      }

      const { Mañana, Noche } = res.disponibilidad;
      const opts = Array.from(turnoSel.options);

      opts.forEach(opt => {
        if (opt.value === 'Mañana') {
          opt.disabled = !Mañana;
          opt.text     = Mañana ? '🌅 Mañana' : '🌅 Mañana (ocupado)';
        }
        if (opt.value === 'Noche') {
          opt.disabled = !Noche;
          opt.text     = Noche  ? '🌙 Noche'  : '🌙 Noche (ocupado)';
        }
      });

      if (!Mañana && !Noche) {
        note.className   = 'text-xs mt-1.5 text-red-500 font-medium';
        note.textContent = '⚠️ No hay turnos disponibles para esta fecha.';
        turnoSel.value    = '';
        turnoSel.disabled = true;
      } else {
        note.textContent  = Mañana && Noche
          ? '✓ Ambos turnos disponibles.'
          : `✓ Solo turno ${Mañana ? 'Mañana' : 'Noche'} disponible.`;
        note.className    = 'text-xs mt-1.5 text-green-600 font-medium';
        turnoSel.value    = Mañana ? 'Mañana' : 'Noche';
        turnoSel.disabled = false;
      }
    } catch (_) {
      note.textContent  = '';
      turnoSel.disabled = false;
    }
  }

  // ── RESERVAR ───────────────────────────────────────────
  async function handleReservar(e) {
    e.preventDefault();
    const fecha = el('reserva-fecha').value;
    const turno = el('reserva-turno').value;

    if (!fecha) { showAlert('reserva-alert', 'error', 'Seleccioná una fecha.'); return; }
    if (!turno) { showAlert('reserva-alert', 'error', 'Seleccioná un turno.');  return; }

    setLoading('btn-reservar', true, 'Reservando…');
    hideAlert('reserva-alert');

    try {
      const res = await apiPost({
        action:   'reservar',
        email:    currentUser.email,
        edificio: currentUser.edificio,
        depto:    currentUser.depto,
        nombre:   currentUser.nombre,
        fecha,
        turno
      });

      if (res.success) {
        showAlert('reserva-alert', 'success', res.message);
        el('reserva-form').reset();
        el('reserva-fecha').min = new Date().toISOString().split('T')[0];
        resetTurnoSelect();
      } else {
        showAlert('reserva-alert', 'error', res.error || 'No se pudo confirmar la reserva.');
      }
    } catch (_) {
      showAlert('reserva-alert', 'error', 'Error de conexión. Intentá de nuevo.');
    } finally {
      setLoading('btn-reservar', false, 'Confirmar Reserva');
    }
  }

  // ── CARGAR RESERVAS ────────────────────────────────────
  async function loadReservas() {
    const container = el('reservas-container');
    container.innerHTML = `
      <div class="flex justify-center py-10">
        <div class="w-6 h-6 border-2 border-indigo-500 border-t-transparent rounded-full spin"></div>
      </div>`;

    try {
      const res = await apiGet({ action: 'getReservas', email: currentUser.email });

      if (!res.success) {
        container.innerHTML = `<p class="text-center text-red-500 text-sm py-8">${res.error}</p>`;
        return;
      }

      if (res.reservas.length === 0) {
        container.innerHTML = `
          <div class="text-center py-14 fade-in">
            <div class="text-5xl mb-3">📅</div>
            <p class="font-semibold text-slate-600">Sin reservas próximas</p>
            <p class="text-sm text-slate-400 mt-1">Hacé tu primera reserva desde la pestaña <strong>Reservar</strong></p>
          </div>`;
        return;
      }

      container.innerHTML = `<div class="flex flex-col gap-3 fade-in">
        ${res.reservas.map(buildReservaCard).join('')}
      </div>`;

      container.querySelectorAll('.btn-cancelar').forEach(btn => {
        btn.addEventListener('click', () => handleCancelar(btn.dataset.id, btn));
      });

    } catch (_) {
      container.innerHTML = `<p class="text-center text-red-500 text-sm py-8">Error al cargar las reservas.</p>`;
    }
  }

  function buildReservaCard(r) {
    const [year, month, day] = r.fecha.split('-');
    const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    const fechaDisplay = `${parseInt(day)} de ${meses[parseInt(month) - 1]} de ${year}`;
    const turnoIcon    = r.turno === 'Mañana' ? '🌅' : '🌙';
    const turnoColor   = r.turno === 'Mañana'
      ? 'bg-amber-50 text-amber-700 border-amber-200'
      : 'bg-indigo-50 text-indigo-700 border-indigo-200';

    return `
      <div class="bg-white border border-slate-200 rounded-2xl p-4 flex items-center justify-between gap-3" id="card-${r.id}">
        <div class="flex items-center gap-3 min-w-0">
          <div class="text-3xl flex-shrink-0">${turnoIcon}</div>
          <div class="min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-semibold text-slate-800 text-sm">${r.edificio}</span>
              <span class="text-xs font-medium px-2 py-0.5 rounded-full border ${turnoColor}">${r.turno}</span>
            </div>
            <p class="text-sm text-slate-500 mt-0.5">${fechaDisplay}</p>
            <p class="text-xs text-slate-400">Depto ${r.depto}</p>
          </div>
        </div>
        <button
          class="btn-cancelar flex-shrink-0 text-xs font-medium text-red-500 hover:text-red-700 border border-red-200 hover:border-red-300 hover:bg-red-50 rounded-xl px-3 py-2 transition-all"
          data-id="${r.id}">
          Cancelar
        </button>
      </div>`;
  }

  // ── CANCELAR ───────────────────────────────────────────
  async function handleCancelar(idReserva, btn) {
    if (!confirm('¿Cancelar esta reserva?\nEsta acción no se puede deshacer.')) return;

    const originalHTML = btn.innerHTML;
    btn.disabled   = true;
    btn.textContent = '…';

    try {
      const res = await apiPost({
        action:     'cancelar',
        idReserva,
        email:      currentUser.email
      });

      if (res.success) {
        const card = el(`card-${idReserva}`);
        if (card) {
          card.style.transition = 'opacity 0.3s, transform 0.3s';
          card.style.opacity    = '0';
          card.style.transform  = 'scale(0.97)';
          setTimeout(() => card.remove(), 300);
        }
        showToast('✓ Reserva cancelada correctamente.', 'success');
      } else {
        showToast(res.error || 'No se pudo cancelar.', 'error');
        btn.innerHTML = originalHTML;
        btn.disabled  = false;
      }
    } catch (_) {
      showToast('Error de conexión. Intentá de nuevo.', 'error');
      btn.innerHTML = originalHTML;
      btn.disabled  = false;
    }
  }

  // ── UI Helpers ─────────────────────────────────────────
  function el(id) { return document.getElementById(id); }

  function setLoading(btnId, loading, text) {
    const btn = el(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading
      ? `<span class="w-4 h-4 border-2 border-white border-t-transparent rounded-full spin inline-block mr-1.5"></span>${text}`
      : text;
  }

  function showAlert(id, type, msg) {
    const div = el(id);
    div.textContent = msg;
    div.className   = `text-sm rounded-xl px-4 py-3 ${
      type === 'error'
        ? 'bg-red-50 text-red-700 border border-red-200'
        : 'bg-green-50 text-green-700 border border-green-200'
    }`;
    div.classList.remove('hidden');
  }

  function hideAlert(id) { el(id).classList.add('hidden'); }

  function showToast(msg, type) {
    const t = el('toast');
    t.textContent = msg;
    t.className   = `fixed bottom-5 left-1/2 -translate-x-1/2 px-5 py-3 rounded-2xl text-sm font-medium shadow-xl z-50 text-white max-w-xs text-center transition-all ${
      type === 'success' ? 'bg-green-600' : 'bg-red-600'
    }`;
    t.classList.remove('hidden');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.add('hidden'), 3500);
  }

  function resetTurnoSelect() {
    const sel = el('reserva-turno');
    sel.disabled = false;
    sel.value    = '';
    Array.from(sel.options).forEach(opt => {
      opt.disabled = false;
      if (opt.value === 'Mañana') opt.text = '🌅 Mañana';
      if (opt.value === 'Noche')  opt.text = '🌙 Noche';
      if (opt.value === '')       opt.text = 'Primero seleccioná una fecha';
    });
    el('disp-note').textContent = '';
    el('disp-note').className   = 'text-xs mt-1.5 text-slate-400';
  }

  // ── Bind Events ────────────────────────────────────────
  function bindEvents() {
    el('login-form').addEventListener('submit',   handleLogin);
    el('reserva-form').addEventListener('submit', handleReservar);
    el('btn-logout').addEventListener('click',    handleLogout);

    el('tab-btn-reservar').addEventListener('click',     () => switchTab('reservar'));
    el('tab-btn-mis-reservas').addEventListener('click', () => switchTab('mis-reservas'));

    el('reserva-fecha').addEventListener('change', e => {
      resetTurnoSelect();
      el('disp-note').textContent = '';
      checkDisponibilidad(e.target.value);
    });

    // Limpiar alerta al tipear
    ['login-email', 'login-password'].forEach(id => {
      el(id).addEventListener('input', () => hideAlert('login-alert'));
    });
  }

  // ── Start ──────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', init);

})();
</script>
</body>
</html>
