<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUM HACHE - Gestión de Reservas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #0c4a6e; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Estilo minimalista enfocado en legibilidad */
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-700 font-light">

    <div id="app" class="max-w-md mx-auto p-6">
        <header class="mb-10 text-center">
            <div class="text-3xl font-black tracking-tighter text-slate-900">HACHE<span class="text-sky-600">.</span></div>
            <p class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">Consultora de Datos</p>
        </header>

        <div id="loginView" class="bg-white p-8 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100">
            <h2 class="text-xl font-semibold text-slate-800 mb-6 tracking-tight">Acceso Residentes</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-4 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-sky-500 outline-none transition-all">
                <input type="password" id="pass" placeholder="Contraseña" class="w-full p-4 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-sky-500 outline-none transition-all">
                <button onclick="handleLogin()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-semibold hover:bg-slate-800 transition shadow-lg shadow-slate-900/20">Ingresar</button>
            </div>
        </div>

        <div id="mainView" class="hidden space-y-8">
            <div class="flex justify-between items-end">
                <div>
                    <p class="text-xs text-slate-400 font-medium uppercase tracking-wider">Bienvenido/a,</p>
                    <h2 id="userName" class="text-2xl font-bold text-slate-900">Cargando...</h2>
                </div>
                <button onclick="logout()" class="text-xs font-bold text-red-400 hover:text-red-600 transition">CERRAR SESIÓN</button>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-sm font-bold text-slate-900 mb-4 uppercase tracking-widest">Agendar SUM</h3>
                <div class="grid grid-cols-1 gap-4">
                    <input type="date" id="resFecha" class="p-4 bg-slate-50 rounded-xl border-none text-sm focus:ring-2 focus:ring-sky-500">
                    <select id="resTurno" class="p-4 bg-slate-50 rounded-xl border-none text-sm focus:ring-2 focus:ring-sky-500 appearance-none">
                        <option value="Mañana">Turno Mañana (09:00 - 14:00)</option>
                        <option value="Noche">Turno Noche (19:00 - 01:00)</option>
                    </select>
                    <button onclick="handleReserva()" class="bg-sky-600 text-white py-4 rounded-xl font-bold hover:bg-sky-700 transition shadow-md shadow-sky-600/20">Confirmar Reserva</button>
                </div>
            </div>

            <div>
                <h3 class="text-sm font-bold text-slate-900 mb-4 uppercase tracking-widest">Mis Próximos Turnos</h3>
                <div id="listaReservas" class="space-y-4">
                    </div>
            </div>
        </div>

        <div id="loading" class="fixed inset-0 bg-white/90 hidden flex flex-col items-center justify-center z-50">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-100 h-12 w-12 mb-4"></div>
            <p class="text-xs font-bold text-slate-400 animate-pulse uppercase tracking-widest">Conectando con HACHE API</p>
        </div>
    </div>

    <script>
        // URL DE TU PROPIO DESPLIEGUE EN APPS SCRIPT
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbznoHEKJQJT1ZKRNFTQug3IN53IpfteYAnDBSJdxYN9BGxJCXDRlQllBqP-SCfdMbMa/exec'; 
        
        let user = JSON.parse(localStorage.getItem('sum_ch_user'));

        // Al cargar la página, verificamos si hay sesión activa
        window.onload = () => { 
            if(user) renderDashboard(); 
        };

        // Función centralizada para peticiones Fetch
        async function call(payload) {
            document.getElementById('loading').classList.remove('hidden');
            try {
                // Apps Script requiere el método POST para recibir JSON en el body
                const response = await fetch(APPS_SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload) 
                });
                const data = await response.json();
                if(!data.success) throw new Error(data.message);
                return data;
            } catch (e) {
                alert("Atención: " + e.message);
                return null;
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            if(!email || !password) return alert("Completa todos los campos");

            const res = await call({ action: 'login', email, password });
            if(res) {
                user = res.user;
                localStorage.setItem('sum_ch_user', JSON.stringify(user));
                renderDashboard();
            }
        }

        function renderDashboard() {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
            document.getElementById('userName').innerText = user.nombre;
            loadReservas();
        }

        async function loadReservas() {
            const res = await call({ action: 'getReservas', email: user.email });
            const container = document.getElementById('listaReservas');
            
            if(res && res.data.length > 0) {
                container.innerHTML = res.data.map(r => `
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 flex justify-between items-center transition hover:border-sky-200 shadow-sm">
                        <div>
                            <p class="text-[10px] font-black text-sky-600 uppercase tracking-tighter mb-1">${r.turno}</p>
                            <p class="text-sm font-bold text-slate-800">${r.fecha}</p>
                            <p class="text-[10px] font-medium text-slate-400 italic">${r.estado}</p>
                        </div>
                        ${r.estado === 'Confirmada' ? `
                            <button onclick="cancelar('${r.id}')" 
                                class="bg-red-50 text-red-500 text-[10px] font-bold px-4 py-2 rounded-lg hover:bg-red-500 hover:text-white transition">
                                CANCELAR
                            </button>` : ''}
                    </div>
                `).join('');
            } else {
                container.innerHTML = `<p class="text-center text-xs text-slate-400 py-10">No tienes registros aún.</p>`;
            }
        }

        async function handleReserva() {
            const fecha = document.getElementById('resFecha').value;
            const turno = document.getElementById('resTurno').value;
            
            if(!fecha) return alert("Por favor, selecciona una fecha válida.");
            
            const res = await call({ 
                action: 'crearReserva', 
                ...user, 
                fecha, 
                turno 
            });
            
            if(res) { 
                alert("¡Reserva confirmada con éxito!"); 
                loadReservas(); 
            }
        }

        async function cancelar(id) {
            if(!confirm("¿Estás seguro de que deseas cancelar esta reserva? Recordá la política de 48hs.")) return;
            const res = await call({ action: 'cancelarReserva', idReserva: id });
            if(res) { 
                alert("Reserva cancelada satisfactoriamente."); 
                loadReservas(); 
            }
        }

        function logout() { 
            localStorage.removeItem('sum_ch_user'); 
            location.reload(); 
        }
    </script>
</body>
</html>
